      - label: "2 ScapulaS"
        output: "Scapulas"



      - label: "1 True Ribs 1-7"
        output: "Rib 1-7"
      - label: "2 False Ribs 8-12"
        output: "Rib 8-12"
      - label: "MCL"
        output: "MCL"
      - label: "Paraspinals (Erector Spinae ESTS ESLS)"
        output: "Paraspinal Muscles"
      ## ARMS REGION
      - "Lateral Thoracic"
      - label: "Wrist"
        output: "Wrist"
      - "Elbow"
      - label: "1 Arm"
        output: "Arm"
      - label: "2 Arms"
        output: "Arms"
      - label: "1 Posterior Forearm ONE UUL (wrist extensors)"
        output: "Posterior Forearm (over Extensors)"
      - label: "2 Posterior ForearmS BOTH BBL (wrist extensors)"
        output: "Posterior Forearms (over Extensors)"
      - label: "1 Anterior Forearm ONE UUL (wrist flexors)"
        output: "Anterior Forearm (over Flexors)"
      - label: "2 Anterior ForearmS BOTH BBL (wrist flexors)"
        output: "Anterior Forearms (over Flexors)"
        ## WRIST & HAND
      - label: "12 FingerS (MCP jt metacarpophalangeal knuckles)"
        output: "Fingers (MCP)"
      - label: "22 FingerS (PIP jt PROXIMAL interphalangeal)"
        output: "Fingers (PIP)"
      - label: "32 FingerS (DIP jt DISTAL interphalangeal)"
        output: "Fingers (DIP)"
      - label: "11 one Finger (MCP jt metacarpophalangeal knuckles)"
        output: "Finger (MCP)"
      - label: "21 one Finger (PIP jt PROXIMAL interphalangeal)"
        output: "Finger (PIP)"
      - label: "31 one Finger (DIP jt DISTAL interphalangeal)"
        output: "Finger (DIP)"

      ## PELVIC REGION
      - label: "Glutes (Buttocks)"
        output: "Glutes (Buttocks)"
      - label: "Glutes"
        output: "Glutes"
      - label: "Sacroilliac Joint - SI Jt - Hip Glute"
        output: "Sacroilliac Jt"
      - label: "Coxofemoral Joint - CF Jt - Hip"
        output: "Coxofemoral Jt"
      - "Anterior Hip"

      ## LEGS REGION
