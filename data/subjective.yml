        output: "Back"
      - label: "Back & Glutes"
        output: "Back & Glutes"
      - label: "1 Bodyy"
        output: "Body"

      - label: "1 Scapula"
        output: "Scapula"
      - label: "2 ScapulaS"
        output: "Scapulas"



      - label: "1 True Ribs 1-7"
