      - label: "2 False Ribs 8-12"
        output: "Rib 8-12"
      - label: "MCL"
        output: "MCL"
      - label: "Paraspinals (Erector Spinae ESTS ESLS)"
        output: "Paraspinal Muscles"
      ## ARMS REGION
      - "Lateral Thoracic"
      - "Wrist"
      - "Elbow"
      - label: "1 Arm"
        output: "Arm"
      - label: "2 Arms"
        output: "Arms"
      - label: "1 Posterior Forearm ONE UUL (wrist extensors)"
