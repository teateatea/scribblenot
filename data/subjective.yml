sections:
  - id: subjective_section
    label: "Subjective"
    nav_label: "Symptoms"
    show_field_labels: false
    contains:
      - field: sumuscle_field
    note:
      note_label: "#### SUBJECTIVE"

fields:
  - id: sumuscle_field
    label: "Signs / Symptoms"
    format: "{year}-{month}-{day}: {place}{region}: {patientdescribes} {subjective_tag}{starting_since}{starting_frequency}{duration_unit}{pluralizer}{starting_ago}."
    max_entries: 12
    lists:
      - place
      - region
      - patientdescribes
      - subjective_tag
      - starting_since
      - starting_frequency
      - duration_unit
    format_lists:
      - year
      - month
      - day
      - pluralizer
      - starting_ago

lists:
  - id: region
    label: "[REGION]"
    default: empty_space
    modal_start: search
    preview: "[REGION]"
   # joiner_style: comma
   # max_entries: 3
    items:
      - id: empty_space
        label: "1 (Empty Space)"
        output: ""
        # Head Region
      - label: "2 Head, Neck, Shoulders HNS"
        output: "Head, Neck, Shoulders"
      - label: "3 Head, Neck, and Shoulders HNS"
        output: "Head, Neck, and Shoulders"
      - label: "1 Shoulder Unilateral GH"
        output: "Shoulder"
      - label: "2 ShoulderS Bilateral GHS"
        output: "Shoulders"
