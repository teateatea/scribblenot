sections:
  - id: subjective_section
    label: "Subjective"
    nav_label: "Symptoms"
    show_field_labels: false
  #  hotkey: z
    contains:
      - field: sumuscle_field
    note:
      note_label: "#### SUBJECTIVE"

fields:
  - id: sumuscle_field
    label: "Signs / Symptoms"
    format: "{year}-{month}-{day}: {place}{region}: {patientdescribes} {subjective_tag}{starting_since}{starting_frequency}{duration_unit}." # {pluralizer}{starting_ago}."
    max_entries: 12
    contains:
      - { list: place }
      - { list: region }
      - { list: patientdescribes }
      - { list: subjective_tag }
      - { list: starting_since }
      - { list: starting_frequency }
      - { list: duration_unit }

lists:
  - id: region
    label: "[REGION]"
    default: empty_space
    modal_start: search
    preview: "[REGION]"
   # joiner_style: comma
   # max_entries: 3
    items:
      - id: empty_space
        label: "[EMPTY]"
        output: ""
        # Head Region
      - label: "Head, Neck, Shoulders HNS"
        output: "Head, Neck, Shoulders"
      - label: "Head, Neck, and Shoulders HNS"
        output: "Head, Neck, and Shoulders"
      - label: "Shoulder{summ_pluralizer} Unilateral GH"
        output: "Shoulder{summ_pluralizer}"
      - label: "2 ShoulderS Bilateral GHS"
        output: "Shoulders"
      - label: "Head Only HNS"
        output: "Head"
      - label: "Neck Only HNS"
        output: "Neck"
      - label: "TMJ2 Jaw TMJ"
        output: "Jaw"
      - label: "TMJ3 Cranial Bones TMJ (Skull)"
        output: "Cranial Bones"
      - label: "TMJ1 HNS+Intraoral"
