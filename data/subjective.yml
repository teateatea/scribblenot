      - id: empty_space
        label: "1 (Empty Space)"
        output: ""
      # SUBJECTIVE TAGS
      - "discomfort"
      - "minor discomfort"
      - "minor pain"
      - "mild pain"
      - "reduced pain"
      - "significantly reduced pain"
      - "increased pain"
      - "irritation"
      - "pain with activity"
      - "general tightness"
      - "tightness"
      - "tightness and pain"
      - "tightness, swelling & inflammation"
      - "pain"
      - "pain and weakness"
      - "aching pain"
      - "sharp pain"
      - "tingling pain"
      - "shooting pain"
      - "burning pain"
      - "soreness"
      - "tightness and tenderness"
      - "tightness without pain"
      - "significant pain"
      - "training-related soreness"


