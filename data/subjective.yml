        output: "Lower Leg (Calf)"
      - label: "Lower LegS Both ((Calves Calf))"
        output: "Lower Legs"
      - label: "Anterior Lower Leg (Calf)"
        output: "Anterior Lower Leg (Calf)"
      - label: "Posterior Lower Leg (Calf)"
        output: "Posterior Lower Leg (Calf)"
      - label: "Quads"
        output: "Quads"
      - label: "Hamstrings"
        output: "Hamstrings"
      - label: "Hamstrings Posterior Thigh"
        output: "Posterior Thigh (over Hamstrings)"
      - label: "1 Legg Unilateral"
        output: "Leg"
      - label: "2 Leggs Bilateral"
        output: "Legs"
      - label: "Feet foots"
        output: "Feet"
