      - label: "Foot - Sole (Feet UU Unilateral)"
        output: "Foot (Sole)"
      - label: "Feet - Soles (Foot BB Bilateral)"
        output: "Feet (Soles)"

  - id: patientdescribes
    label: "Patient [DESCRIBES]"
    default: pt_describes
    items:
      - id: pt_describes
        label: "describes"
        output: "Pt describes"
      - label: "describes continued"
        output: "Pt describes continued"
      - label: "describes intermittent"
        output: "Pt describes intermittent"
      - label: "describes ongoing"
        output: "Pt describes ongoing"
      - label: "reports"
        output: "Pt reports"
      - label: "reports continued"
        output: "Pt reports continued"
      - label: "reports intermittent"
        output: "Pt reports intermittent"
      - label: "reports ongoing"
        output: "Pt reports ongoing"
      - label: "enjoys" # probably should break this out for just exercise?
        output: "Pt enjoys"
      - label: "previously enjoyed"
        output: "Pt previously enjoyed"
        

