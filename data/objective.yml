sections:
  - id: objective_section
    label: "Objective / Observations"
    nav_label: OBJECT
    contains:
      - field: obmuscle_field
    note:
      note_label: "#### OBJECTIVE"

fields:
  - id: obmuscle_field
    label: "Muscle Observation"
    format: "{year}-{month}-{day}: {place}{muscle}: {tag}"
    repeat_limit: 12
    lists:
      - muscle
      - place
      - tag
    format_lists:
      - year
      - month
      - day
  - id: ests_mm_field
    label: "Muscles of the Erector Spinae"
    format: "{ests_mm_list}"
    lists:
      - ests_mm_list


lists:
  - id: muscle
    label: "muscle"
    modal_start: search
    default: empty_space
    joiner_style: comma
    repeat_limit: 12
    items:
      - id: empty_space
        label: "1 (Empty Space)"
        output: ""
      # HEAD - TMJ EXTRAORAL
      - id: ests_mm_item
        label: "Erector Thoracic MM"
        output: "{ests_mm_field}"
        fields:
          - ests_mm_field
      - label: "Masseter (TMJ)"
        output: "Masseter"
      - label: "Temporalis (TMJ)"
        output: "Temporalis"
      - label: "Suprahyoid muscles mm (TMJ - geniohyoid, digastric, mylohyoid, stylohyoid)"
        output: "Suprahyoid muscles"
      - label: "Mylohyoid (TMJ suprahyoid - sublingual fan, deep/superior to digastric)"
        output: "Mylohyoid"
      - label: "Geniohyoid (TMJ suprahyoid - sublingual near midline, superior to mylohyoid; \n probably not this one)"
        output: "Geniohyoid"
      - label: "Stylohyoid (TMJ suprahyoid - anterior to SCM)"
        output: "Stylohyoid"
      - label: "DD2 Digastric BOTH (TMJ suprahyoid two muscle bellies)"
        output: "Digastric (posterior)"
      - label: "D3 Digastric POSTERIOR  Belly (TMJ suprahyoid - anterior to SCM)"
        output: "Digastric (posterior)"
      - label: "D4 Digastric ANTERIOR Belly (TMJ suprahyoid - sublingual near midline, superficial to mylohyoid)"
        output: "Digastric (anterior)"
      # TMJ INTRAORAL
      - label: "Lateral Pterygoid (TMJ - superior & inferior heads)"
        output: "Lateral Pterygoid"
      - label: "Medial Pterygoid (TMJ)"
        output: "Medial Pterygoid"
      # NECK
      - label: "Sternocleidomastoid (SCM)"
        output: "Sternocleidomastoid (SCM)"
      - label: "Suboccipital Muscle Group"
        output: "Suboccipital Muscle Group"
      - label: "Scalenes muscles"
        output: "Scalene Muscles"
      - label: "Splenius Capitis (mastoid process to Spinous proc.C7-T3)"
        output: "Splenius Capitis"
      - label: "Splenius CERVICIS (Transverse proc.C1-C3 to Spinous proc.C7-T3)"
        output: "Splenius Cervicis"
      # CHEST
      - label: "3 Pectoralis Major pecmajor"
        output: "Pectoralis Major"
      - label: "3 Pectoralis Minor pecminor"
        output: "Pectoralis Minor"
      - label: "1 Pectoralis Major & Minor Pecs"
        output: "Pectoralis Major & Minor"
      - label: "2 Pectoral Muscles Pecs"
        output: "Pectoral Muscles"
      - label: "Serratus Anterior serrant"
        output: "Serratus Anterior"
      - label: "1 Rectus Capitis Posterior Minor (medial short - occipitals)"
        output: "Rectus Capitis Posterior Minor "
      - label: "2 Rectus Capitis Posterior Major (medial long - occipitals)"
        output: "Rectus Capitis Posterior Major"
      - label: "3 Obliquus Capitis Superior (anterolateral long - occipitals)"
        output: "Obliquus Capitis Superior"
      - label: "4 Obliquus Capitis Inferior (C2->C1 - occipitals)"
        output: "Obliquus Capitis Superior"
      - "Intercostal Muscles"
      # ABDOMEN
      - label: "1 Psoas (Femur to T12-L4)"
        output: "Psoas Major"
      - label: "Iliacus (insed the Iliac Crest; psoas)"
        output: "Iliacus"
      # BACK - SHOULDER
      - label: "Levator Scapula Levscap"
        output: "Levator Scapula"
      - label: "1 Trapezius Traps UFT Upper"
        output: "Trapezius (Upper Fibers)"
      - label: "2 Trapezius Traps (General)"
        output: "Trapezius"
      - label: "3 Trapezius Traps LFT Lower"
        output: "Trapezius (Lower Fibers)"
      - label: "3 RhomboidS BL"
        output: "Rhomboids"
      - label: "2 Rhomboid UL"
        output: "Rhomboid"
      - label: "Supraspinatus"
        output: "Supraspinatus"
      - label: "Infraspinatus"
        output: "Infraspinatus"
      - label: "Subscapularis"
        output: "Subscapularis"
      - label: "Erector Spinae ES LS ESLS (Lumbar L1-L5)"
        output: "Erector Spinae (L1-L5)"
      - label: "Erector Spinae ES LS ESLS (Lumbar L1-L3)"
        output: "Erector Spinae (L1-L3)"
      - label: "Erector Spinae ES LS ESLS (Lumbar L4-S1)"
