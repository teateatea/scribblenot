      - "Teres Minor"
      - label: "1 Teres Major & Minor teres mm teresmm teremm"
        output: "Teres Major & Minor"
      - label: "2 Teres Major TERESMAjor terema"
        output: "Teres Major"
      - label: "3 Teres Minor TERESMInor teremi"
        output: "Teres Major & Minor"
      - label: "Latissimus Dorsi Lats"
