      - label: "Inferior Gemellus (Glutes, small inferior to Obturator Internus)"
        output: "Inferior Gemellus"
      - label: "Multifidus Lumborum"
        output: "Multifidus Lumborum"
      - label: "Multifidus Thoracis"
        output: "Multifidus Thoracis"
      # ANT LEG
      - label: "Tensor Fasciae Latae (crosses hip AND knee) (TFL - tlf) - Quads qds"
        output: "Tensor Fasciae Latae (TFL)"
      - label: "Vastus Medialis Obliquus (crosses knee ONLY) - VMO Quads qds"
        output: "Vastus Medialis Obliquus (VMO)"
      - label: "Vastus Medialis (crosses knee ONLY) - Quads qds"
        output: "Vastus Medialis"
      - label: "Vastus Lateralis (crosses knee ONLY) - Quads qds"
        output: "Vastus Lateralis"
      - label: "Rectus Femoris (crosses hip AND knee)- RecFem Rec Fem quads qds"
        output: "Rectus Femoris"
      - label: "Vastus Lateralis & Medialis (crosses knee ONLY) - quads qds"
        output: "Vastus Lateralis & Medialis"
      # POST LEG
      - label: "Biceps Femoris - Hamstrings"
        output: "Biceps Femoris"
      - label: "Semitendinosus - Hamstrings"
        output: "Semitendinosus"
      - label: "Semimembranosus - Hamstrings"
        output: "Semimembranosus"
      - label: "Popliteus"
        output: "Popliteus"
      # MEDIAL LEG
