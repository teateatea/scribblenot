      - label: "GGracilis (adductors - cross knee to pes anserine)"
        output: "Gracilis"
      - label: "Adductor MMagnus (adductors - the main one)"
        output: "Adductor Magnus"
      - label: "Adductor LLongus (adductors - deeper and small)"
        output: "Adductor Longus"
      - label: "Adductor Brevis (adductors - very deep, probably not this one)"
        output: "Adductor Brevis"
      - label: "PPopliteus"
        output: "Popliteus"
      # LOWER LEG & FOOT
      - label: "Peroneals Peroneus"
        output: "Peroneal Muscles"
      - label: "Peroneals Peroneus"
        output: "Peroneal Muscles"
      - label: "Peroneus Longus"
        output: "Peroneus Longus"
      - label: "Tibialis Anterior Tibant"
        output: "Tibialis Anterior"
      - label: "Tibialis Posterior Tibpost"
        output: "Tibialis Posterior"
      - label: "Gastrocnemius Gastrocs (superficial calf, crosses knee)"
        output: "Gastrocnemius"
      - label: "Soleus (deep calf, does not cross knee)"
        output: "Soleus"



