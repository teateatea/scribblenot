sections:
  - id: intake_optional
    label: ""
    nav_label: "Intake"
    # hotkey: d
    show_field_labels: false
    contains:
      - field: int_exha_field
      - field: int_exha_field_brief
      - field: int_adl_field
      - field: int_specialist_field
     # - field: test_error_field


fields:
  - id: pt_info
    label: "Pronouns: {pt_pronouns}"
    format: ""
    contains:
      - list: pt_pronouns
  - id: int_adl_field
    label: "Activities of Daily Living"
    format: "{int_adl_list}"
   # max_entries: 3
   # joiner_style: newline
    contains:
      - list: int_adl_list
      
  - id: int_exha_field
    label: "Exercise Habits"
    format: "{year}-{month}-{day}: {patientdescribes} {int_exha_list}{starting_since}{starting_frequency}{duration_unit}." # {pluralizer}{starting_ago}."
    max_entries: 12
   # joiner_style: newline
    contains:
      - list: patientdescribes
      - list: int_exha_list
      - list: starting_since
      - list: starting_frequency
      - list: duration_unit
      
  - id: int_exha_field_brief
    label: "Exercise Habits Brief"
    format: "- {patientdescribes} {int_exha_list}{frequency}{starting_since}{starting_frequency}{duration_unit}." # {pluralizer}{starting_ago}." {year}-{month}-{day}: 
    max_entries: 12
   # joiner_style: newline
    contains:
      - list: patientdescribes
      - list: int_exha_list
      - list: frequency
      - list: starting_since
      - list: starting_frequency
      - list: duration_unit
      
  - id: int_specialist_field
    label: "Specialists & Treatment"
    format: "{year}-{month}-{day}: {practioner_start} {int_practioner_list}{starting_since}{starting_frequency}{duration_unit}." # {pluralizer}{starting_ago}."
    max_entries: 12
   # joiner_style: newline
    contains:
      - list: practioner_start
      - list: int_practioner_list
      - list: starting_since
      - list: starting_frequency
      - list: duration_unit

lists:
  - id: int_exha_list
    label: "[ACTIVITY]"
    preview: "[ACTIVITY]"
    max_entries: 1
    joiner_style: comma_and
    modal_start: list
    items:
      - id: exha_1
        output: "training"
      - id: exha_2
        output: "walking"
      - id: exha_3
        output: "exercising"
      - id: exha_3_re
        output: "regular exercise"
      - id: exha_4
        output: "exercising regularly each week"
      - id: exha__adherence_close
        output: "close adherence to assigned rehab exercises"
      - id: exha__adherence_reasonable
        output: "reasonable adherence to assigned rehab exercises"
      - id: exha_adherence_limited
        output: "limited adherence to assigned exercises"
      - id: exha__adherence_poor
        output: "poor adherence to assigned exercises"
      - id: exha__adherence_none
        output: "not completing assigned exercises"
      - id: exha_8
        output: "a physically demanding work day"
      - id: exha_9
        output: "physical work that demands most or all of the Pt's daily energy"
      - id: exha_10
        output: "irregular exercise habits,"
      - id: exha_11
        output: "a return to previously assigned rehab exercises"
      - id: exha_12
        output: "reduced activity"
      - id: exha_13
        output: "resting without exercise"
      - id: exha_14
        output: "great interest in exercising more"
      - id: exha_15
        output: "interest in exercising more"
      - id: exha_16
        output: "low interest in exercising more"
      - id: exha_17
        output: "yoga"
      - id: exha_18
        output: "working out (cardio)"
        
        
  - id: int_adl_list
    max_entries: 3
    joiner_style: newline
    items:
      - id: adl_1
        output: "first activity"
      - id: adl_2
        output: "second activity"


  - id: pt_pronouns
    label: "Patient Prononuns"
    default: they_them
    sticky: true
    items:
      - id: they_them
        label: "they/them"
        output: "they/them"
        assigns:
          - list: obj_pronoun
            item: obj_them
          - list: sub_pronoun
            item: sub_they
          - list: pos_pronoun
            item: pos_their
          - list: pecs_detail
            item: pecs_male
      - id: he_him
        label: "he/him"
        output: "he/him"
        assigns:
          - list: obj_pronoun
            item: obj_him
          - list: sub_pronoun
            item: sub_he
          - list: pos_pronoun
            item: pos_his
          - list: pecs_detail
            item: pecs_male
      - id: she_her
        label: "she/her"
        output: "she/her"
        assigns:
          - list: obj_pronoun
            item: obj_her
          - list: sub_pronoun
            item: sub_she
          - list: pos_pronoun
            item: pos_her
          - list: pecs_detail
            item: pecs_female
            
  - id: sub_pronoun # they_he_she
    label: "subject Pronouns"
    default: sub_they
    sticky: true
    items:
      - id: sub_they
        label: "they"
        output: "they"
      - id: sub_he
        label: "he"
        output: "he"
      - id: sub_she
        label: "she"
        output: "she"
        
  - id: obj_pronoun # them_him_her
    label: "object Pronouns"
    default: obj_them
    sticky: true
    items:
      - id: obj_them
        label: "them"
        output: "them"
      - id: obj_him
        label: "him"
        output: "him"
      - id: obj_her
        label: "her"
        output: "her"
  - id: pos_pronoun # their_his_her
    label: "Possessive Pronouns"
    default: pos_their
    sticky: true
    items:
      - id: pos_their
        label: "their"
        output: "their"
      - id: pos_his
        label: "his"
        output: "his"
      - id: pos_her
        label: "her"
        output: "her"

