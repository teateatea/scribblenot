  - id: exha_list_root
    label: "[ACTIVITYROOT]"
    preview: "[ACTIVITYROOT]"
    max_entries: 12
    joiner_style: comma
    modal_start: list
    items:
      - id: empty_space
        label: "(empty)"
        output: ""
      - id: exha_activity
        label: "[SPECIFIC ACTIVITY]"
        output: "{activities_branch}"
        fields:
          - activities_branch
      - id: exha_habits
        label: "[HABITS ADHERENCE]"
        output: "{adherence_branch}"
        fields:
          - adherence_branch
  - id: activities
    label: "activities"
    preview: "[activities]"
    max_entries: 12
    joiner_style: comma_and
    modal_start: list
    items:
      - id: empty_space
        label: "(empty/done)"
        output: ""
      - id: exha_1
        output: "training"
      - id: exha_2
        output: "walking"
      - id: exha_21
        output: "running"
      - id: exha_22
        output: "resistance training"
      - id: exha_18
        output: "working out (cardio)"
      - id: exha_17
        output: "yoga"
      - id: exha_pil
        output: "pilates"
      - id: exha_19
        output: "powerlifting"
      - id: exha_20
        output: "CrossFit"
      - output: "dragonboating"
      - "paddleboarding"

  - id: adherence
    label: "adherence"
    preview: "[adherence]"
    max_entries: 12
    joiner_style: comma_and
    modal_start: list
    items:
      - id: empty_space
        label: "(empty/done)"
        output: ""
      - id: exha_31
        output: "limited exercise"
      - id: exha_3
        output: "exercising"
      - id: exha_3_re
        output: "regular exercise"
      - id: exha_4
        output: "exercising regularly each week"
      - id: exha__adherence_close
        output: "close adherence to assigned rehab exercises"
      - id: exha__adherence_reasonable
        output: "reasonable adherence to assigned rehab exercises"
      - id: exha_adherence_limited
        output: "limited adherence to assigned exercises"
      - id: exha__adherence_poor
        output: "poor adherence to assigned exercises"
      - id: exha__adherence_none
        output: "not completing assigned exercises"
      - id: exha_8
        output: "a physically demanding work day"
      - id: exha_9
        output: "physical work that demands most or all of the Pt's daily energy"
      - id: exha_10
        output: "irregular exercise habits,"
      - id: exha_11
        output: "a return to previously assigned rehab exercises"
      - id: exha_11b
        output: "returning to regular exercise habits"
      - id: exha_12
        output: "reduced activity"
      - id: exha_13
        output: "resting without exercise"
      - id: exha_14
        output: "great interest in exercising more"
      - id: exha_15
        output: "interest in exercising more"
      - id: exha_15
        output: "interest in strength training"
      - id: exha_16
        output: "low interest in exercising more"
