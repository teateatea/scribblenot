sections:
  - id: consent_section
    label: "Special Consent"
    nav_label: "Consent"
    show_field_labels: false
    contains:
      - field: consent_pecs_field
    note:
      note_label: ""
      
collections:
  - id: consent_collection
    label: "Consent CC"
    nav_label: "CC"

fields:
  - id: consent_pecs_field
    label: "Consent Pecs"
    format: "- {year}-{month}-{day}: {patientconsents}"
    contains:
      - list: patientconsents
     # - list: pecs_detail



lists:
  - id: pecs_detail
    default: pecs_male
    items:
      - id: pecs_male
        label: "cs m"
        output: "Chest Wall Muscles"
      - id: pecs_female
        label: "cs f"
        output: "Chest Wall Muscles (not including breasts)"
  - id: patientconsents
    preview: "(consent statement)"
    items:
      - id: consent_pecs_continued
        label: "Pecs Continued"
        output: "Patient verbally consented to the continued assessment and treatment of the {pecs_detail}."
      - id: consent_glutes_continued
        label: "Glutes Continued"
        output: "Patient verbally consented to the continued assessment and treatment of the Buttocks (gluteal muscles)."
      - id: consent_both_continued
        label: "Both Continued"
        output: "Patient verbally consented to the continued assessment and treatment of the {pecs_detail}, and the Buttocks (gluteal muscles)."
      - id: consent_pecs_initial
        label: "Pecs Initial"
        output: "Patient verbally consented to the assessment and treatment of the {pecs_detail}."
      - id: consent_glutes_initial
        label: "Glutes Initial"
        output: "Patient verbally consented to the assessment and treatment of the Buttocks (gluteal muscles)."
      - id: consent_both_initial
        label: "Both Initial"
        output: "Patient verbally consented to the assessment and treatment of the {pecs_detail}, and the Buttocks (gluteal muscles)."
      - id: consent_pecs_no_temp
        label: "Pecs No Temp"
        output: "Patient specifically refused assessment and treatment of the {pecs_detail}."
      - id: consent_glutes_no_temp
        label: "Glutes No Temp"
        output: "Patient specifically refused assessment and treatment of the Buttocks (gluteal muscles)."
      - id: consent_both_no_temp
        label: "Both No Temp"
        output: "Patient specifically refused assessment and treatment of the {pecs_detail}, and the Buttocks (gluteal muscles)."
      - id: consent_pecs_no_ongoing
        label: "Pecs No Ongoing"
        output: "Patient specifically refused assessment and treatment of the {pecs_detail}.\n  - {year}-{month}-{day}: Avoid asking for this unnecessarily."
      - id: consent_glutes_no_ongoing
        label: "Glutes No Ongoing"
        output: "Patient specifically refused assessment and treatment of the Buttocks (gluteal muscles).\n  - {year}-{month}-{day}: Avoid asking for this unnecessarily."
      - id: consent_both_no_ongoing
        label: "Both No Ongoing"
        output: "Patient specifically refused assessment and treatment of the {pecs_detail}, and the Buttocks (gluteal muscles).\n  - {year}-{month}-{day}: Avoid asking for this unnecessarily."