      - { id: day_30, label: "30", output: "30" }
      - { id: day_31, label: "31", output: "31" }

  - id: start_hour_list
    label: "Start Time [mm / XM / (x)]"
    preview: "hh"
    sticky: true
    items:
      - { id: hour_9, label: "9:mm", output: "9" }
      - { id: hour_10, label: "10:mm", output: "10" }
      - { id: hour_11, label: "11:mm", output: "11" }
      - { id: hour_12, label: "12:mm", output: "12" }
