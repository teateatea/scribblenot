# Authoring reference:
#  - Template: id, groups
#      planned modern, not fully wired yet: label, nav_label, header, footer
#  - Group: id, sections
#      current app metadata: nav_label
#      planned modern, not fully wired yet: label, header, footer
#  - Section: id, fields
#      modern optional: label, nav_label, header, footer
#      current app metadata: section_type, is_intake, heading_search_text,
#        heading_label, note_render_slot
#      legacy/transitional: map_label, data_file, date_prefix
#  - Field: id, label, lists
#      modern optional: format, repeat_limit
#  - List: id, label, items
#      modern optional: sticky, default, preview, repeating, modal_start
#      repeating values: comma_and, comma_and_the, comma_or, comma, semicolon, slash, newline
#      modal_start values: list, search
#  - Item: output
#      modern optional: id, label, fields
#      legacy/transitional: default, note
#      fields may contain existing field IDs or inline field definitions:
#        fields:
#          - existing_field_id
#          - id: inline_field_id
#            label: "Inline Field"
#            format: "{list_id} text {other_list_id}"
#            lists:
#              - list_id
#              - other_list_id
#            repeat_limit: 3
#      When an item has fields, its output may include {field_id} placeholders
#      that are filled from those branch field answers.
#  - Labels may include {list_id} placeholders for modal display only.
#      Resolution order: current field values, sticky values, default values.
template:
  id: patient_standard_template
  groups:
    - intake_group
    - subjective_group
    - objective_group


groups:
  - id: intake_group
    nav_label: "INTAKE"
    sections:
      - appointment_section
  - id: objective_group
    nav_label: "OBJECTIVE"
    sections:
      - objective_section
  - id: subjective_group
    nav_label: "SUBJECTIVE"
    sections:
      - subjective_section



sections:
  - id: appointment_section
    label: "Appointment"
    nav_label: "APPNT"
    section_type: multi_field
    fields:
      - date_field
      - appointment_date_field
      - appointment_requested_field



fields:
  - id: date_field
    label: "Entry Date"
    format: "" # Intentionally left blank, we'll see what happens.
    lists:
      - day
      - month
      - year
  - id: appointment_date_field
    label: "Appointment Date"
    format: "{date_month_wor_list} {day}, {year} at {start_hour_list}:{start_minute_list}{am_pm_list} ({duration_list} min)"
    lists:
      - duration_list
      - start_hour_list
      - start_minute_list
      - am_pm_list
      - day
      - date_month_wor_list
  - id: appointment_requested_field
    label: "Request"
    format: "{year}-{month}-{day}: Pt requested a {appointment_type_list}{the_region}."
    lists:
      - appointment_type_list
      - the_region



lists:
  - id: year
    label: "Year"
    preview: "YYYY"
    sticky: true
    default: year_2026
    items:
      - id: year_2025
        label: "2025"
        output: "2025"
      - id: year_2026
        label: "2026"
        output: "2026"

  - id: date_month_wor_list
    label: "Month"
    preview: "MMM"
    sticky: true
    items:
      - { id: month_01, label: "Jan 1", output: "Jan" }
      - { id: month_02, label: "Feb 2", output: "Feb" }
      - { id: month_03, label: "Mar 3", output: "Mar" }
      - { id: month_04, label: "Apr 4", output: "Apr" }
      - { id: month_05, label: "May 5", output: "May" }
      - { id: month_06, label: "Jun 6", output: "Jun" }
      - { id: month_07, label: "Jul 7", output: "Jul" }
      - { id: month_08, label: "Aug 8", output: "Aug" }
      - { id: month_09, label: "Sep 9", output: "Sep" }
      - { id: month_10, label: "Oct 10", output: "Oct" }
      - { id: month_11, label: "Nov 11", output: "Nov" }
      - { id: month_12, label: "Dec 12", output: "Dec" }

  - id: month
    label: "Month"
    preview: "MM"
    sticky: true
    items:
      - { id: month_num_01, label: "01", output: "01" }
      - { id: month_num_02, label: "02", output: "02" }
      - { id: month_num_03, label: "03", output: "03" }
      - { id: month_num_04, label: "04", output: "04" }
      - { id: month_num_05, label: "05", output: "05" }
