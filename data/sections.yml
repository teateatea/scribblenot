      - { id: month_num_10, label: "10", output: "10" }
      - { id: month_num_11, label: "11", output: "11" }
      - { id: month_num_12, label: "12", output: "12" }

  - id: day
    label: "Day"
    preview: "DD"
    sticky: true
    items:
      - { id: day_01, label: "01", output: "01" }
      - { id: day_02, label: "02", output: "02" }
      - { id: day_03, label: "03", output: "03" }
      - { id: day_04, label: "04", output: "04" }
