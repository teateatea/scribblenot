# Authoring reference:
#  - Top-level blocks supported across data/*.yml:
#    template, groups, sections, collections, fields, lists, boilerplate
#  - IDs must be globally unique across groups/sections/collections/fields/lists.
#  - Runtime shape is inferred from structure:
#    - section with field refs -> multi-field section
#    - section with no children -> free-text section
#    - collection with list refs -> collection section
#  - Contains rules:
#    template.contains -> group refs only
#    group.contains -> section refs or collection refs
#    section.contains -> field refs or list refs
#    collection.contains -> list refs only
#  - Child ref shapes:
#    - { group: some_group_id }
#    - { section: some_section_id }
#    - { collection: some_collection_id }
#    - { field: some_field_id }
#    - { list: some_list_id }
#
#  - template:
#    id?
#    contains[]
#
#  - group:
#    id
#    nav_label?             # map label; uppercased at runtime
#    note_label?            # top-level note heading for the whole group
#    boilerplate_refs[]?
#    contains[]
#
#  - section:
#    id
#    label?
#    nav_label?
#    show_field_labels?     # default true; false renders multi_field values without "Label: "
#    contains[]
#    note?:
#      note_label?          # rendered managed subsection heading (e.g. "#### SUBJECTIVE")
#
#  - collection:
#    id
#    label?
#    nav_label?
#    contains[]
#    note?:
#      note_label?          # rendered managed subsection heading
#
#  - field:
#    id
#    label
#    format?                # e.g. "{year}-{month}-{day}"
#    lists[]?               # list ids used by the field modal / value builder
#    repeat_limit?          # max repeats before auto-advance
#
#  - list:
#    id
#    label?
#    preview?               # short preview text in multi-field UI
#    sticky?                # remember chosen output across notes
#    default?               # item id selected by default
#    modal_start?           # list | search
#    repeating?             # comma_and | comma_and_the | comma_or | comma | semicolon | slash | newline
#    items[]
#
#  - list item:
#    string shorthand       # "My Label" -> id auto-slugged, output defaults to label
#    or full object with:
#      id?
#      label?               # UI/search text; falls back to output
#      output?              # note/export text; falls back to label
#      default_enabled?     # collection items default true when omitted
#      fields[]?            # optional referenced field ids for item-driven branching
#      branch_fields[]?     # optional inline field objects for modal branching
#
#  - boilerplate:
#    id
#    text
#
#  - Label rules:
#    id = stable runtime identity
#    label = human-facing name
#    nav_label = map/sidebar label
#    note_label = group top-level note heading
#    section.note.note_label = note subsection heading

groups:
  - id: safety_group
    nav_label: SAFETY
    contains:
      - section: contraindications_section
     # - section: freetext_test_section

sections:
  - id: contraindications_section
   # body: checklist
    label: Contraindications
    nav_label: CONTRA
    contains:
      - field: test_field
      - field: appointment_requested_field
fields:
  - id: test_field
   # body: checklist
    label: Free
    nav_label: FREE
    joiner_style: comma_and
   # max_entries: 3
    contains:
      - list: contraindications_list
      - list: region


lists:
  - id: contraindications_list
    label: Contraindications
    items:
      - id: Fever
        label: "fever"
        output: "Fever item"
       # branch_fields: [appointment_date_field]
      - Open wound
      - New rash
      - Dizziness
      - Severe headache

---

template:
  id: patient_standard_template
  contains:
    - group: intake_group
    - group: subjective_group
    - group: treatment_group
    - group: objective_group
    - group: safety_group

groups:
  - id: intake_group
    nav_label: INTAKE
    contains:
      - section: appointment_section
      
  - id: subjective_group
    nav_label: SUBJECTIVE
    note_label: "## SUBJECTIVE"
    contains:
      - section: subjective_section

  - id: treatment_group
    nav_label: TREATMENT
    note_label: "## TREATMENT / PLAN"
    contains:
      - section: treatment_modifications
      - section: treatment_section_prone
      - section: treatment_section_supine
     # - collection: back_all_prone_collection
     # - collection: tx_regions
     # - collection: tx_prone_back

  - id: objective_group
    nav_label: OBJECTIVE
    note_label: "## OBJECTIVE / OBSERVATIONS"
    contains:
      - section: objective_section


sections:
  - id: appointment_section
    label: Appointment
    nav_label: "Appointment"
    show_field_labels: false
    hotkey: Z
    contains:
    #  - field: date_field
      - field: appointment_date_field
      - field: appointment_requested_field
    #  - field: patient_pronoun

 

#  - collection:
#    id
#    label?
#    nav_label?
#    contains[]
#    note?:
#      note_label?  
fields:
 # - id: date_field
 #   label: "{year}-{month}-{day}"
 #   format: ""
 #   lists:
 #     - day
 #     - month
 #     - year

  - id: appointment_date_field
    label: "Date & Time"
   # note_label: "Appointment Date & Time"
    format: "# {date_month_word_list} {day}, {year} at {start_hour_list}:{start_minute_list}{am_pm_list} ({duration_list} min)"
    lists:
     # - duration_list
      - start_hour_list
      - start_minute_list
      - duration_list
      - day
      - date_month_word_list
      - year
   #   - day
   #   - date_month_wor_list

  - id: appointment_requested_field
    label: Request
    format: "{year}-{month}-{day}: Pt requested a {appointment_type_list}{requested_regions}." # {the_region}."
  #  lists:
  #    - appointment_type_list
  #    - the_region
    contains:
      - list: appointment_type_list
      - field: requested_regions #


  - id: requested_regions
    label: Requested Regions
    format: "{single_region}"
    preview: "region"
    joiner_style: comma_and_the
    max_entries: 6
    contains:
      - field: single_region

  - id: single_region
    label: Requested Region
    format: "{place}{region}"
    contains:
      - list: region
      - list: place

