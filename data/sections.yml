  - id: start_minute_list
    label: "Start Time {start_hour_list}:## [XM / (x)]"
    preview: "mm"
    default: minute_00
    items:
      - { id: minute_00, label: "{start_hour_list}:00", output: "00" }
      - { id: minute_15, label: "{start_hour_list}:15", output: "15" }
      - { id: minute_30, label: "{start_hour_list}:30", output: "30" }
      - { id: minute_45, label: "{start_hour_list}:45", output: "45" }

  - id: am_pm_list
    label: "{start_hour_list}:{start_minute_list}XM (x)"
    preview: "XM"
    default: pm_item
    items:
      - { id: am_item, label: "{start_hour_list}:{start_minute_list}AM morning", output: "AM" }
      - { id: pm_item, label: "{start_hour_list}:{start_minute_list}PM afternoon", output: "PM" }

  - id: duration_list
    label: "Duration (## min)"
    preview: "##"
    default: duration_60
    items:
      - { id: duration_30, label: "30 min", output: "30" }
      - { id: duration_45, label: "45 min", output: "45" }
      - { id: duration_60, label: "60 min", output: "60" }
      - { id: duration_75, label: "75 min", output: "75" }
      - { id: duration_90, label: "90 min", output: "90" }

# Appointment Request

  - id: appointment_type_list
    label: "Pt requested a "
    default: appointment_type_treatment
