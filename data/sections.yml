blocks:
  # Groups
  - type: group
    id: intake
    name: "INTAKE"
    num: 1
    children: [header, adl, exercise, sleep_diet, social, history, specialists]
  - type: group
    id: subjective
    name: "SUBJECTIVE"
    num: 2
    children: [subjective_section]
  - type: group
    id: treatment
    name: "TREATMENT"
    num: 3
    children: [tx_mods, tx_regions]
  - type: group
    id: objective
    name: "OBJECTIVE"
    num: 4
    children: [objective_section]
  - type: group
    id: post_tx
    name: "POST-TX"
    num: 5
    children: [post_treatment, remedial_section, tx_plan, infection_control_section]

  # Sections
  - type: section
    id: header
    name: "Header"
    map_label: "Header"
    section_type: header
    children: [field_date, field_start_time, field_duration, field_appointment_type]
  - type: section
    id: adl
    name: "Activities of Daily Living"
    map_label: "ADL"
    section_type: free_text
  - type: section
    id: exercise
    name: "Exercise Habits"
    map_label: "Exer"
    section_type: free_text
  - type: section
    id: sleep_diet
    name: "Sleep & Diet"
    map_label: "Slp/Dt"
    section_type: free_text
  - type: section
    id: social
    name: "Social & Stress"
    map_label: "Social"
    section_type: free_text
  - type: section
    id: history
    name: "History & Previous Diagnoses"
    map_label: "History"
    section_type: free_text
  - type: section
    id: specialists
    name: "Specialists & Treatment"
    map_label: "Specialists"
    section_type: free_text
  - type: section
    id: subjective_section
    name: "Subjective"
    map_label: "Subjective"
    section_type: free_text
  - type: section
    id: tx_mods
    name: "Treatment Modifications & Preferences"
    map_label: "Tx Mods"
    section_type: list_select
    data_file: "tx_mods.yml"
  - type: section
    id: tx_regions
    name: "Treatment Regions"
    map_label: "Regions"
    section_type: block_select
    data_file: "tx_regions.yml"
  - type: section
    id: objective_section
    name: "Objective / Observations"
    map_label: "Objective"
    section_type: list_select
    data_file: "objective_findings.yml"
    date_prefix: true
  - type: section
    id: post_treatment
    name: "Post-Treatment"
    map_label: "Post-Tx"
    section_type: free_text
  - type: section
    id: remedial_section
    name: "Remedial Exercises & Self-Care"
    map_label: "Remedial"
    section_type: list_select
    data_file: "remedial.yml"
    date_prefix: true
  - type: section
    id: tx_plan
    name: "Treatment Plan / Therapist Notes"
    map_label: "Tx Plan"
    section_type: free_text
  - type: section
    id: infection_control_section
    name: "Infection Control"
    map_label: "Infection Ctrl"
    section_type: checklist
    data_file: "infection_control.yml"

  # Header fields
  - type: field
    id: field_date
  - type: field
    id: field_start_time
  - type: field
    id: field_duration
  - type: field
    id: field_appointment_type
