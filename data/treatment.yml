sections:
  - id: treatment_section
    label: "Treatment - Prone"
    nav_label: "PRONE"
    contains:
      - field: prone_back_field
      - field: prone_glutes_field
      - field: prone_legs_field
    note:
      note_label: "" #"#### TREAMENT / PLAN"

---
# BACK PRONE
fields:                                          # BACK PRONE
  - id: prone_back_field
    label: "BACK"
    max_actives: 1
    contains:
     # - list: year
      - collection: back_all_prone_collection
      - collection: back_upper_mid_prone_collection
      - collection: back_lower_prone_collection
collections:                                     # BACK PRONE
  - id: back_all_prone_collection
    label: "ALL - UPPER MIDDLE & LOW BACK"
    nav_label: "BACKAPC"
    default_enabled: true
    contains:
      - list: back_all_prone
  - id: back_upper_mid_prone_collection
    label: "UPPER, & MIDDLE BACK"
    nav_label: "BACKUMPC"
    default_enabled: false
    contains:
      - list: back_upper_mid_prone
  - id: back_lower_prone_collection
    label: "LOWER BACK"
    nav_label: "BACKLPC"
    default_enabled: false
    contains:
      - list: back_lower_prone
lists:                                           # BACK PRONE
  - id: back_all_prone
    label: "UPPER, MIDDLE & LOWER BACK (Prone)"
    items:
      - id: swedish
        label: "General Swedish Techniques"
        output: "- General Swedish Techniques"
      - id: spec_comp_back
        label: "Specific Compressions (Trapezius, LS, Teres, QL)"
        output: "- Specific Compressions:\n- - Trapezius (Upper Fiber)\n- - Levator Scapula\n- - Teres Major & Minor\n- - Quadratus Lumborum"
      - id: stretch_sa
        label: "Stretch (Serratus Anterior)"
        output: "- Stretch (Serratus Anterior)"
      - id: broad_comp_triceps
        label: "Broad Compressions (Triceps Brachii)"
        output: "- Broad Compressions (Triceps Brachii)"
      - id: muscle_strip_es
        label: "Muscle Stripping (Erector Spinae)"
        output: "- Muscle Stripping (Erector Spinae)"

  - id: back_upper_mid_prone
    label: "UPPER & MIDDLE BACK (Prone)"
    items:
      - id: swedish
        label: "General Swedish Techniques"
        output: "- General Swedish Techniques"
      - id: spec_comp_back
        label: "Specific Compressions (Trapezius, Teres)"
        output: "- Specific Compressions:\n- - Trapezius (Upper Fiber)\n- - Teres Major & Minor"
      - id: muscle_strip_es
        label: "Muscle Stripping (Erector Spinae)"
        output: "- Muscle Stripping (Erector Spinae)"

  - id: back_lower_prone
    label: "LOWER BACK (Prone)"
    items:
      - id: swedish
        label: "General Swedish Techniques"
        output: "- General Swedish Techniques"
      - id: spec_comp_ql
        label: "Specific Compressions (Quadratus Lumborum)"
        output: "- Specific Compressions (Quadratus Lumborum)"
      - id: muscle_strip_es
        label: "Muscle Stripping (Erector Spinae)"
        output: "- Muscle Stripping (Erector Spinae)"
      - id: fascial_l4l5
        label: "Fascial Techniques (L4-L5)"
        output: "- Fascial Techniques (L4-L5)"
        default_enabled: false

---
# GLUTES
fields:                                          # GLUTES
  - id: prone_glutes_field
    label: "GLUTES"
    contains:
      - collection: prone_glutes_collection

collections:                                     # GLUTES

  - id: prone_glutes_collection
    label: "GLUTES"
    nav_label: "GLUTESPC"
    default_enabled: false
    contains:
      - list: glutes_prone
lists:                                           # GLUTES
  - id: glutes_prone
    label: "GLUTEAL MUSCLES / BUTTOCKS (Prone)"
    items:
      - id: broad_comp
        label: "Broad Compressions"
        output: "- Broad Compressions"
      - id: ulnar_knead
        label: "Ulnar Kneading"
        output: "- Ulnar Kneading"
      - id: spec_comp_pir_gmed
        label: "Specific Compressions (Piriformis, Gluteus Medius)"
        output: "- Specific Compressions (Ulnar border):\n- - Piriformis\n- - Gluteus Medius"
      - id: pin_stretch_pir
        label: "Pin + Stretch (Piriformis)"
        output: "- Pin + Stretch:\n- - Piriformis"
      - id: rocking_si
        label: "Rocking & Rhythmic Techniques (SI Joint)"
        output: "- Rocking & Rhythmic Techniques (SI Jt)"

---
# POST_LEG
fields:                                          # POST_LEG
  - id: prone_legs_field
    label: "POST_LEG"
    contains:
      - collection: prone_legs_collection

collections:                                     # POST_LEG
  - id: prone_legs_collection
    label: "POST_LEG"
    nav_label: "POST_LEGPC"
    default_enabled: false
    contains:
      - list: post_legs_prone
      - list: post_upper_legs_prone
      - list: lower_legs_prone
lists:                                           # POST_LEG
  - id: post_legs_prone
    label: "POSTERIOR LEGS & FEET (Prone)"
    items:
      - id: broad_comp
        label: "Broad Compressions"
        output: "- Broad Compressions"
      - id: ulnar_knead_ham
        label: "Ulnar Kneading (Biceps Femris, Semitendinosus)"
        output: "- Ulnar Kneading\n- - Biceps Femoris\n- - Semitendinosus"
      - id: knuckle_knead
        label: "Knuckle Kneading"
        output: "- Knuckle Kneading"
      - id: fingertip_knead
        label: "Fingertip Kneading"
        output: "- Fingertip Kneading"

  - id: post_upper_legs_prone
    label: "POSTERIOR UPPER LEGS / HAMSTRINGS (Prone)"
    items:
      - id: broad_comp
        label: "Broad Compressions"
        output: "- Broad Compressions"
      - id: ulnar_knead_ham
        label: "Ulnar Kneading (Biceps Femoris, Semitendinosus)"
        output: "- Ulnar Kneading\n- - Biceps Femoris\n- - Semitendinosus"

  - id: lower_legs_prone
    label: "LOWER LEGS & FEET (Prone)"
    items:
      - id: broad_comp
        label: "Broad Compressions"
        output: "- Broad Compressions"
      - id: ulnar_knead
        label: "Ulnar Kneading"
        output: "- Ulnar Kneading"
      - id: knuckle_knead
        label: "Knuckle Kneading"
        output: "- Knuckle Kneading"
      - id: fingertip_knead
        label: "Fingertip Kneading"
        output: "- Fingertip Kneading"

---
lists:


  - id: ant_legs_hips_supine
    label: "ANTERIOR LEGS & HIPS (Supine)"
    items:
      - id: broad_comp
        label: "Broad Compressions"
