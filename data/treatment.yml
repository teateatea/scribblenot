---
collections:
  - id: tx_regions
    label: "Treatment Regions"
    nav_label: "TRTMT"
    contains:
      - list: back_all_prone
      - list: back_upper_mid_prone
      - list: back_lower_prone
      - list: glutes_prone
      - list: post_legs_prone
      - list: post_upper_legs_prone
      - list: lower_legs_prone
      - list: ant_legs_hips_supine
      - list: ant_hips_upper_legs_supine
      - list: lower_legs_supine
      - list: abdomen_intercostals_supine
      - list: abdomen_psoas_supine
      - list: adductors_sidelying
      - list: pecs_supine
      - list: arms_supine
      - list: hns_supine
    note:
      note_label: "#### TREATMENT REGIONS"